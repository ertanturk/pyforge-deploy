name: 'PyForge Deploy'
description: 'Ultra-fast, AST-based Docker building and PyPI distribution using uv'
inputs:
  python_version:
    description: 'Python version used by the workflow runtime'
    default: '3.12'
  pypi_deploy:
    description: 'Set to true to publish to PyPI'
    default: 'true'
  docker_build:
    description: 'Set to true to build and push Docker image'
    default: 'true'
  bump:
    description: 'Version bump type (proud/default/shame; legacy aliases supported)'
    default: ''
  target_branch:
    description: 'The branch to push version changes back to'
    default: 'main'
  docker_platforms:
    description: 'Comma-separated target platforms for Docker buildx'
    default: 'linux/amd64'
  pyforge_cache:
    description: 'Enable .pyforge-deploy-cache restore/save in CI'
    default: 'true'
  pyforge_ast_cache_ttl:
    description: 'AST cache TTL in seconds for CI runs'
    default: '900'
  pyforge_pypi_cache_ttl:
    description: 'PyPI network cache TTL in seconds for CI runs'
    default: '900'
  plugin_timeout_seconds:
    description: 'Per-hook timeout in seconds for pyproject plugin commands'
    default: '300'

runs:
  using: 'composite'
  steps:
    - name: Fail-Fast Pre-flight Checks
      shell: bash
      run: |
        set -euo pipefail
        echo "Running Pre-flight Checks..."

        if [[ "${{ inputs.bump }}" != "" ]]; then
          case "${{ inputs.bump }}" in
            proud|default|shame|major|minor|patch|alpha|beta|rc) ;;
            *)
              echo "::error::Invalid bump '${{ inputs.bump }}'. Expected one of: proud, default, shame, major, minor, patch, alpha, beta, rc"
              exit 1
              ;;
          esac
        fi

        if [[ "${{ inputs.docker_build }}" == "true" ]]; then
          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
            echo "::error::Docker build is enabled, but DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is missing in secrets!"
            exit 1
          fi
          if ! command -v docker >/dev/null 2>&1; then
            echo "::error::Docker CLI is not available in this runner."
            exit 1
          fi
          if ! docker version >/dev/null 2>&1; then
            echo "::error::Docker daemon is not reachable in this runner."
            exit 1
          fi
        fi
        echo "Pre-flight checks passed."

    - name: Set up uv (Ultra-fast Python package installer)
      uses: astral-sh/setup-uv@v3
      with:
        # NOTE:
        # setup-uv cache restore can intermittently return HTTP 400 from the
        # GitHub cache service on some runners/repos. This does not break
        # builds, but it adds noisy warnings. We disable setup-uv's internal
        # cache here because this action already uses explicit project caches
        # (.pyforge-deploy-cache) and setup-python pip caching in workflows.
        enable-cache: false

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Restore PyForge cache directory
      if: ${{ inputs.pyforge_cache == 'true' }}
      uses: actions/cache@v4
      with:
        path: .pyforge-deploy-cache
        key: >-
          pyforge-deploy-cache-${{ runner.os }}-py${{ inputs.python_version }}-
          ${{ hashFiles('pyproject.toml', 'requirements*.txt', 'src/**/*.py') }}
        restore-keys: |
          pyforge-deploy-cache-${{ runner.os }}-py${{ inputs.python_version }}-
          pyforge-deploy-cache-${{ runner.os }}-

    - name: Configure PyForge cache environment
      shell: bash
      run: |
        set -euo pipefail
        echo "PYFORGE_AST_CACHE_TTL=${{ inputs.pyforge_ast_cache_ttl }}" >> "$GITHUB_ENV"
        echo "PYFORGE_PYPI_CACHE_TTL=${{ inputs.pyforge_pypi_cache_ttl }}" >> "$GITHUB_ENV"
        echo "PYFORGE_PLUGIN_TIMEOUT_SECONDS=${{ inputs.plugin_timeout_seconds }}" >> "$GITHUB_ENV"

    - name: Set up Docker Buildx
      if: ${{ inputs.docker_build == 'true' }}
      uses: docker/setup-buildx-action@v3

    - name: Install Project & PyForge Deploy
      shell: bash
      run: |
        set -euo pipefail
        echo "Installing pyforge-deploy..."
        uv pip install --system -e "$GITHUB_ACTION_PATH"

    - name: Deploy / PyPI
      if: ${{ inputs.pypi_deploy == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          CLEAN_VERSION="${GITHUB_REF_NAME#v}"
          pyforge-deploy deploy-pypi --version "$CLEAN_VERSION" --verbose -y
        else
          ARGS=("deploy-pypi" "--verbose" "-y")
          if [[ -n "${{ inputs.bump }}" ]]; then
            ARGS+=("--bump" "${{ inputs.bump }}")
          fi
          pyforge-deploy "${ARGS[@]}"
        fi

    - name: Deploy / Docker Login
      if: ${{ inputs.docker_build == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
          echo "Logging into Docker Hub..."
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
        else
          echo "Docker Hub credentials not provided. Skipping login."
        fi

    - name: Deploy / Docker Build & Push
      if: ${{ inputs.docker_build == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ inputs.docker_platforms }}" == *","* || "${{ inputs.docker_platforms }}" == *"arm64"* ]]; then
          echo "Multi-platform build detected; disabling local wheelhouse to avoid cross-arch wheel mismatch."
          export PYFORGE_DOCKER_WHEELHOUSE=false
        fi
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          CLEAN_VERSION="${GITHUB_REF_NAME#v}"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_NAME="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')"
          DOCKER_USER="$(echo "$DOCKERHUB_USERNAME" | tr '[:upper:]' '[:lower:]')"
          IMAGE_TAG="${DOCKER_USER}/${REPO_NAME}:${CLEAN_VERSION}"
          pyforge-deploy docker-build \
            --image-tag "$IMAGE_TAG" \
            --platforms "${{ inputs.docker_platforms }}" \
            --push --verbose -y
        else
          pyforge-deploy docker-build \
            --platforms "${{ inputs.docker_platforms }}" \
            --push --verbose -y
        fi

    - name: Commit and Tag Version Changes
      if: ${{ inputs.pypi_deploy == 'true' && github.ref_type != 'tag' }}
      shell: bash
      run: |
        set -euo pipefail
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

        git fetch origin "${{ inputs.target_branch }}"
        git checkout -B "${{ inputs.target_branch }}" "origin/${{ inputs.target_branch }}"

        if [[ -f ".pyforge-deploy-cache/version_cache" ]]; then
          git add -f .pyforge-deploy-cache/version_cache
        fi

        if [[ -n "$(git status --porcelain)" ]]; then
          git commit -m "chore: auto-bump version [skip ci]"
          git push origin "${{ inputs.target_branch }}"

          if [[ "${{ github.ref_type }}" != "tag" ]]; then
            NEW_VERSION=$(cat .pyforge-deploy-cache/version_cache)
            if ! git rev-parse -q --verify "refs/tags/v$NEW_VERSION" >/dev/null; then
              echo "Creating new git tag: v$NEW_VERSION"
              git tag "v$NEW_VERSION"
              git push origin "v$NEW_VERSION"
            else
              echo "Tag v$NEW_VERSION already exists; skipping tag creation."
            fi
          fi
        else
          echo "No version changes to commit."
        fi
