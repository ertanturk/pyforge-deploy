name: 'PyForge Deploy'
description: 'Ultra-fast, AST-based Docker building and PyPI distribution using uv'
inputs:
  python_version:
    description: 'Python version used by the workflow runtime'
    default: '3.12'
  pypi_deploy:
    description: 'Set to true to publish to PyPI'
    default: 'true'
  docker_build:
    description: 'Set to true to build and push Docker image'
    default: 'true'
  bump:
    description: 'Version bump type (leave empty to use pyproject.toml)'
    default: ''
  target_branch:
    description: 'The branch to push version changes back to'
    default: 'main'
  run_tests:
    description: 'Set to true to run pytest and ruff before deployment'
    default: 'false'
  run_security_scan:
    description: 'Set to true to run pip-audit before deployment'
    default: 'false'
  docker_platforms:
    description: 'Comma-separated target platforms for Docker buildx'
    default: 'linux/amd64'
  pyforge_cache:
    description: 'Enable .pyforge-deploy-cache restore/save in CI'
    default: 'true'
  pyforge_ast_cache_ttl:
    description: 'AST cache TTL in seconds for CI runs'
    default: '900'
  pyforge_pypi_cache_ttl:
    description: 'PyPI network cache TTL in seconds for CI runs'
    default: '900'

runs:
  using: 'composite'
  steps:
    - name: Fail-Fast Pre-flight Checks
      shell: bash
      run: |
        set -euo pipefail
        echo "Running Pre-flight Checks..."

        if [[ "${{ inputs.bump }}" != "" ]]; then
          case "${{ inputs.bump }}" in
            major|minor|patch|alpha|beta|rc) ;;
            *)
              echo "::error::Invalid bump '${{ inputs.bump }}'. Expected one of: major, minor, patch, alpha, beta, rc"
              exit 1
              ;;
          esac
        fi

        if [[ "${{ inputs.docker_build }}" == "true" ]]; then
          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
            echo "::error::Docker build is enabled, but DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is missing in secrets!"
            exit 1
          fi
        fi
        echo "Pre-flight checks passed."

    - name: Set up uv (Ultra-fast Python package installer)
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python_version }}

    - name: Restore PyForge cache directory
      if: ${{ inputs.pyforge_cache == 'true' }}
      uses: actions/cache@v4
      with:
        path: .pyforge-deploy-cache
        key: >-
          pyforge-deploy-cache-${{ runner.os }}-py${{ inputs.python_version }}-
          ${{ hashFiles('pyproject.toml', 'requirements*.txt', 'src/**/*.py') }}
        restore-keys: |
          pyforge-deploy-cache-${{ runner.os }}-py${{ inputs.python_version }}-
          pyforge-deploy-cache-${{ runner.os }}-

    - name: Configure PyForge cache environment
      shell: bash
      run: |
        set -euo pipefail
        echo "PYFORGE_AST_CACHE_TTL=${{ inputs.pyforge_ast_cache_ttl }}" >> "$GITHUB_ENV"
        echo "PYFORGE_PYPI_CACHE_TTL=${{ inputs.pyforge_pypi_cache_ttl }}" >> "$GITHUB_ENV"

    - name: Set up Docker Buildx
      if: ${{ inputs.docker_build == 'true' }}
      uses: docker/setup-buildx-action@v3

    - name: Install Project & PyForge Deploy
      shell: bash
      run: |
        set -euo pipefail
        echo "Installing pyforge-deploy..."
        uv pip install --system "${{ github.action_path }}"
        
        if [[ "${{ inputs.run_tests }}" == "true" ]]; then
          echo "Installing project dependencies for testing..."
          if [[ -f "pyproject.toml" ]]; then 
            uv pip install --system -e . 
          elif [[ -f "requirements.txt" ]]; then 
            uv pip install --system -r requirements.txt
          fi
          if [[ -f "requirements-dev.txt" ]]; then 
            uv pip install --system -r requirements-dev.txt
          fi
        fi

    - name: Run Security Scan (pip-audit)
      if: ${{ inputs.run_security_scan == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "Running pip-audit to check for known vulnerabilities..."

        if [[ -f "requirements.txt" ]]; then
          uvx pip-audit --desc -r requirements.txt || { echo "::error::Security vulnerabilities found in requirements.txt"; exit 1; }
        elif [[ -f "pyproject.toml" ]]; then
          uv export --format requirements-txt --no-hashes -o /tmp/pyforge-audit-reqs.txt
          uvx pip-audit --desc -r /tmp/pyforge-audit-reqs.txt || { echo "::error::Security vulnerabilities found in exported dependencies"; exit 1; }
        else
          echo "No dependency manifest found; skipping pip-audit."
        fi

        echo "No known vulnerabilities found."

    - name: Run Tests & Linter
      if: ${{ inputs.run_tests == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        echo "Running Ruff Linter..."
        uvx ruff check . || { echo "::error::Linter failed!"; exit 1; }
        
        echo "Running Pytest..."
        if [ -d "tests" ]; then
          uvx --with . pytest || { echo "::error::Tests failed!"; exit 1; }
        else
          echo "No 'tests' directory found, skipping pytest."
        fi

    - name: Run PyPI Deployment
      if: ${{ inputs.pypi_deploy == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          CLEAN_VERSION="${GITHUB_REF_NAME#v}"
          pyforge-deploy deploy-pypi --version "$CLEAN_VERSION" --verbose -y
        else
          ARGS=("deploy-pypi" "--verbose" "-y")
          if [[ -n "${{ inputs.bump }}" ]]; then
            ARGS+=("--bump" "${{ inputs.bump }}")
          fi
          pyforge-deploy "${ARGS[@]}"
        fi

    - name: Docker Login
      if: ${{ inputs.docker_build == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
          echo "Logging into Docker Hub..."
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
        else
          echo "Docker Hub credentials not provided. Skipping login."
        fi

    - name: Run Docker Build & Push
      if: ${{ inputs.docker_build == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        pyforge-deploy docker-build \
          --platforms "${{ inputs.docker_platforms }}" \
          --push --verbose -y

    - name: Commit and Tag Version Changes
      if: ${{ inputs.pypi_deploy == 'true' }}
      shell: bash
      run: |
        set -euo pipefail
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git fetch origin "${{ inputs.target_branch }}"
        git checkout -B "${{ inputs.target_branch }}" "origin/${{ inputs.target_branch }}"

        if [[ -f ".version_cache" ]]; then
          git add -f .version_cache
        fi
        while IFS= read -r about_file; do
          git add -f "$about_file"
        done < <(find . -type f -name "__about__.py" -not -path "*/.venv/*")
        
        if [[ -n "$(git status --porcelain)" ]]; then
          git commit -m "chore: auto-bump version [skip ci]"
          git push origin "${{ inputs.target_branch }}"
          
          if [[ "${{ github.ref_type }}" != "tag" ]]; then
            NEW_VERSION=$(cat .version_cache)
            if ! git rev-parse -q --verify "refs/tags/v$NEW_VERSION" >/dev/null; then
              echo "Creating new git tag: v$NEW_VERSION"
              git tag "v$NEW_VERSION"
              git push origin "v$NEW_VERSION"
            else
              echo "Tag v$NEW_VERSION already exists; skipping tag creation."
            fi
          fi
        else
          echo "No version changes to commit."
        fi