name: 'PyForge Deploy'
description: 'Ultra-fast, AST-based Docker building and PyPI distribution using uv'
inputs:
  pypi_deploy:
    description: 'Set to true to publish to PyPI'
    default: 'true'
  docker_build:
    description: 'Set to true to build and push Docker image'
    default: 'true'
  bump:
    description: 'Version bump type (leave empty to use pyproject.toml)'
    default: ''
  target_branch:
    description: 'The branch to push version changes back to'
    default: 'main'
  run_tests:
    description: 'Set to true to run pytest and ruff before deployment'
    default: 'false'
  run_security_scan:
    description: 'Set to true to run pip-audit before deployment'
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Fail-Fast Pre-flight Checks
      shell: bash
      run: |
        echo "Running Pre-flight Checks..."
        if [[ "${{ inputs.docker_build }}" == "true" ]]; then
          if [[ -z "$DOCKERHUB_USERNAME" || -z "$DOCKERHUB_TOKEN" ]]; then
            echo "::error::Docker build is enabled, but DOCKERHUB_USERNAME or DOCKERHUB_TOKEN is missing in secrets!"
            exit 1
          fi
        fi
        echo "Pre-flight checks passed."

    - name: Set up uv (Ultra-fast Python package installer)
      uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
        cache-dependency-glob: "**/pyproject.toml"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Set up Docker Buildx
      if: ${{ inputs.docker_build == 'true' }}
      uses: docker/setup-buildx-action@v3

    - name: Install Project & PyForge Deploy
      shell: bash
      run: |
        echo "Installing pyforge-deploy..."
        uv pip install --system pyforge-deploy
        
        if [[ "${{ inputs.run_tests }}" == "true" ]]; then
          echo "Installing project dependencies for testing..."
          if [[ -f "pyproject.toml" ]]; then 
            uv pip install --system -e . 
          elif [[ -f "requirements.txt" ]]; then 
            uv pip install --system -r requirements.txt
          fi
          if [[ -f "requirements-dev.txt" ]]; then 
            uv pip install --system -r requirements-dev.txt
          fi
        fi

    - name: Run Security Scan (pip-audit)
      if: ${{ inputs.run_security_scan == 'true' }}
      shell: bash
      run: |
        echo "Running pip-audit to check for known vulnerabilities..."
        # uvx runs the tool in an isolated environment instantly
        uvx pip-audit --desc || { echo "::error::Security vulnerabilities found!"; exit 1; }
        echo "No known vulnerabilities found."

    - name: Run Tests & Linter
      if: ${{ inputs.run_tests == 'true' }}
      shell: bash
      run: |
        echo "Running Ruff Linter..."
        uvx ruff check . || { echo "::error::Linter failed!"; exit 1; }
        
        echo "Running Pytest..."
        if [ -d "tests" ]; then
          uvx --with . pytest || { echo "::error::Tests failed!"; exit 1; }
        else
          echo "No 'tests' directory found, skipping pytest."
        fi

    - name: Run PyPI Deployment
      if: ${{ inputs.pypi_deploy == 'true' }}
      shell: bash
      run: |
        if [[ "${{ github.ref_type }}" == "tag" ]]; then
          CLEAN_VERSION="${GITHUB_REF_NAME#v}"
          pyforge-deploy deploy-pypi --version "$CLEAN_VERSION" --verbose -y
        else
          BUMP_ARG=""
          if [[ -n "${{ inputs.bump }}" ]]; then
            BUMP_ARG="--bump ${{ inputs.bump }}"
          fi
          pyforge-deploy deploy-pypi $BUMP_ARG --verbose -y
        fi

    - name: Docker Login
      if: ${{ inputs.docker_build == 'true' }}
      shell: bash
      run: |
        if [[ -n "$DOCKERHUB_USERNAME" && -n "$DOCKERHUB_TOKEN" ]]; then
          echo "Logging into Docker Hub..."
          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
        else
          echo "Docker Hub credentials not provided. Skipping login."
        fi

    - name: Run Docker Build & Push
      if: ${{ inputs.docker_build == 'true' }}
      shell: bash
      run: pyforge-deploy docker-build --push --verbose -y

    - name: Commit and Tag Version Changes
      shell: bash
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git fetch origin ${{ inputs.target_branch }}
        git checkout ${{ inputs.target_branch }}
    
        git add -f .version_cache "src/*/__about__.py" "*/__about__.py" || true
        
        if [[ -n "$(git status --porcelain)" ]]; then
          git commit -m "chore: auto-bump version [skip ci]"
          git push origin ${{ inputs.target_branch }}
          
          if [[ "${{ github.ref_type }}" != "tag" ]]; then
            NEW_VERSION=$(cat .version_cache)
            echo "Creating new git tag: v$NEW_VERSION"
            git tag "v$NEW_VERSION"
            git push origin "v$NEW_VERSION"
          fi
        else
          echo "No version changes to commit."
        fi