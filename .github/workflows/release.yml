name: Auto Deploy on Push
run-name: Auto Build and Publish on Push to Main Branch

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Auto Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install PyForge Deploy (Dogfooding)
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Deploy to PyPI
        env:
          PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }} #
        run: |
          pyforge-deploy deploy-pypi --bump patch --verbose

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Docker Image
        run: |
          VERSION=$(pyforge-deploy show-version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          
          pyforge-deploy docker-build --image-tag ${{ secrets.DOCKERHUB_USERNAME }}/pyforge-deploy:$VERSION --verbose
          
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/pyforge-deploy:$VERSION ${{ secrets.DOCKERHUB_USERNAME }}/pyforge-deploy:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pyforge-deploy:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pyforge-deploy:latest