name: Tests With Coverage
run-name: Tests With Coverage by ${{ github.actor }}

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]

      - name: Run tests with coverage (pytest)
        run: coverage run -m pytest --cov=src --cov=scripts --cov-report=xml --cov-report=term-missing tests